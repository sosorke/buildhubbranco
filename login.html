<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login BuildHub para administradores e clientes.">
  <title>Login | BuildHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <div class="loader" id="loader" aria-label="Carregando login">
    <div class="loader-mark">BH</div>
    <div class="loader-line"></div>
  </div>

  <div class="custom-cursor" id="customCursor" aria-hidden="true"></div>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>
  <div class="floating-grid" id="floatingGrid" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="navbar" aria-label="Navegacao principal">
      <a class="brand" href="index.html">
        <span class="brand-symbol" id="brandSymbol">BH</span>
        <span class="brand-text" id="brandText">BuildHub</span>
      </a>
      <div class="nav-menu single-link">
        <a href="index.html">Voltar ao site</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section login-section standalone-auth" id="login">
      <div class="section-heading reveal">
        <p class="eyebrow">Acesso BuildHub</p>
        <h1>Entre no ambiente digital da sua operacao.</h1>
        <p>Use <strong>admin@buildhub.dev</strong> ou <strong>cliente@buildhub.dev</strong> com senha <strong>123456</strong>.</p>
      </div>

      <div class="login-shell reveal">
        <form class="login-card glass" id="loginForm" novalidate>
          <div class="login-badge">BH</div>
          <h3>Login seguro</h3>
          <div class="form-row">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="seu acesso" autocomplete="email">
            <small></small>
          </div>
          <div class="form-row password-row">
            <label for="loginPassword">Senha</label>
            <div class="password-field">
              <input id="loginPassword" type="password" placeholder="sua senha" autocomplete="current-password">
              <button id="togglePassword" type="button" aria-label="Mostrar senha">Ver</button>
            </div>
            <small></small>
          </div>
          <label class="remember">
            <input id="rememberLogin" type="checkbox">
            <span>Lembrar login</span>
          </label>
          <button class="btn btn-primary magnetic" type="submit">Entrar</button>
        </form>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <button class="to-top" id="toTop" type="button" aria-label="Voltar ao topo">^</button>
  <script src="script.js"></script>
</body>
</html>
